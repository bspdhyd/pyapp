<!-- events.html -->
<!DOCTYPE html>
<html lang="en">
    {% include 'bootstrap.html' %}
    {% include 'navbar.html' %}

    <div class="container md-12">
        <div class="row">

            <div class="col-md-9">
                <h5>Create New Member</h5>
                <form action="{{ url_for('nwmember.create_nwmember') }}" method="POST" class="mb-4 p-3 border rounded">
                    <div class="form-group row">
                        <div class="col-sm-6">
                            <label class = "label-control">Last Name(<b>Surname</b>)*</label>
                            <input type="text" name="last_name" class = "form-control" value="" required>
                        </div>
                        <div class="col-sm-6">
                            <label class = "label-control">First Name(Name)*</label>
                            <input type="text" name="first_name" class = "form-control" value="" required>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3">
                            <label class = "label-control">Year of Birth (YOB)</label>
                            <input type="number" name="YOB" value=" " min="1900" max="2050" class = "form-control">
                        </div>
                        <div class="col-sm-3">
                            <label class = "label-control">Gender</label>
                            <select name="Gender" class = "form-control">
                                <option value="M">Male</option>  
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label class = "label-control">Gotram</label>
                            <select name="GotramID" class = "form-control">
                                <option selected="selected" value="">Choose one</option>
                                {% for gotra in gotras %}
                                    <option value="{{ gotra.PG_ID }}">{{ gotra.Gotra }}-{{ gotra.Risheya }}-{{ gotra.Pravara }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-6">
                            <label class = "label-control">Email*</label>
                            <input type="text" name="email" class = "form-control" value="">
                        </div>
                        <div class="col-sm-6">
                            <label class = "label-control">Phone*</label>
                            <input type="text" name="Phone_Num" class = "form-control" value="">
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col-sm-3">
                            <label class = "label-control">Referrer ID*</label>
                            <input type="number" name="Referrer_Id" value="" min="1000" max="99999" class = "form-control">
                        </div>
                        <div class="col-sm-3">
                            <label class = "label-control">Blood Group:</label>
                            <select name="Blood_Group" class = "form-control">
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="NA">Unknown</option>
                            </select>
                        </div>        
                        <div class="col-sm-6">
                            <label class = "label-control">Notes</label>
                            <textarea class = "form-control" name="Notes" max=250></textarea>
                        </div>
                    </div>

                <!-- Address Section -->
                    <div class="form-group row">
                        <div class="col-sm-12" style="position: relative;">
                            <label class="label-control"><b>Search Address</b></label>
                            <input type="text" id="address" name="address" class="form-control" />
                            <div id="suggestions"></div>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-4">
                            <label class="label-control">Address Line 1</label>
                            <input type="text" name="Address_Line1" id="address_line1" class="form-control" readonly>
                        </div>
                        <div class="col-sm-4">
                            <label class="label-control">Address Line 2</label>
                            <input type="text" name="Address_Line2" id="address_line2" class="form-control" readonly>
                        </div>
                        <div class="col-sm-4">
                            <label class="label-control">Location</label>
                            <input type="text" name="Location" id="location" class="form-control" readonly>
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col-sm-3">
                            <label class="label-control">City</label>
                            <input type="text" name="City" id="city" class="form-control" readonly>
                        </div>
                        <div class="col-sm-3">
                            <label class="label-control">State</label>
                            <input type="text" name="State" id="state" class="form-control" readonly>
                        </div>
                        <div class="col-sm-3">
                            <label class="label-control">ZIP / Postal Code</label>
                            <input type="text" name="Zip_Code" id="pincode" class="form-control" readonly>
                        </div>
                        <div class="col-sm-3">
                            <label class="label-control">Country</label>
                            <input type="text" name="Country" id="country" class="form-control" readonly>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success mt-2">Create Member</button>
                </form>
            </div>

            <div class="col-md-3">
                <h5>Recent Members</h5>
                <table class="table table-bordered">
                    <thead>
                        <tr><th>Alias</th></tr>
                    </thead>
                    <tbody>
                        {% for member in members %}
                        <tr><td>{{ member.Alias }}</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>


    <!-- Load external JavaScript -->
    <script src="{{ url_for('static', filename='js/address_af.js') }}"></script>

</body>
</html>
