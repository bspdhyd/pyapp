<!DOCTYPE html>
<html lang="en">
    {% include 'bootstrap.html' %}


<div class="container md-5">
    <h2>Member Login</h2>
    <form method="POST">
        <div class="form-group">
            <label>Member ID</label>
            <input type="text" name="MEMBER_ID" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="Password" class="form-control" required>
        </div>
        <div class="form-group">
            <label class = "label-control">Dharmic Entity:</label>
            <select name="entity_id" class = "form-control">
                <option value="BHBNR001">BSPD - Hyderabad</option>
                <option value="BHBLR001">BSPD - Bangalore</option>
                <option value="BHCHN001">BSPD - Chennai</option>
                <option value="UNIVL001">BSPD-Global Programs</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        {% if message %}
            <p class="text-danger md-3">{{ message }}</p>
        {% endif %}
    </form>
</div>
</body>
</html>
